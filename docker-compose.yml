# Local production-shape stack: PostgreSQL + two app replicas + two load
# balancers (per the owner's request). Mirrors the AWS target architecture
# (RDS + ECS tasks + two ALBs) so you can exercise it before deploying.
#
#   docker compose up --build
#   open http://localhost:8081   (load balancer 1)
#   open http://localhost:8082   (load balancer 2)
#
# Both balancers fan out across app1 + app2, which share one Postgres.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sis
      POSTGRES_USER: sis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sis-dev-pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sis -d sis"]
      interval: 5s
      timeout: 3s
      retries: 12

  app1: &app
    build: .
    environment:
      DATABASE_URL: postgresql://sis:${DB_PASSWORD:-sis-dev-pass}@db:5432/sis
      SIS_SECRET_KEY: ${SIS_SECRET_KEY:-dev-secret-change-me}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  app2:
    <<: *app

  lb1:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    ports:
      - "8081:80"
    restart: unless-stopped

  lb2:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    ports:
      - "8082:80"
    restart: unless-stopped

volumes:
  pgdata:
