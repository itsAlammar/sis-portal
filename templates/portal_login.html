<!DOCTYPE html>
<html lang="{{ locale }}" dir="{{ dir }}">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ t('landing.portal_title') }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="landing-body">
  <div class="landing-card-solo">
    <div class="topbar"><a class="lang-toggle" href="{{ url_for('set_lang', code='ar' if locale=='en' else 'en') }}">{{ t('lang.toggle') }}</a></div>
    <div class="page-eyebrow">{{ t('landing.portal_title') }}</div>
    <h1>{{ t('action.login') }}</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for c, m in messages %}<div class="flash flash--{{ c }}">{{ m }}</div>{% endfor %}
    {% endwith %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>{{ t('auth.student_number') }}</label>
      <input type="text" name="student_number" placeholder="S20250001" required autofocus>
      <label>{{ t('auth.password') }}</label>
      <input type="password" name="password" required autocomplete="current-password">
      <div class="actions-row"><button class="btn--primary">{{ t('action.login') }}</button></div>
    </form>
    <p class="muted" style="margin-top:16px;">
      {{ t('landing.apply_title') }}: <a href="{{ url_for('apply') }}">{{ t('action.register') }}</a> ·
      <a href="{{ url_for('landing') }}">← {{ t('action.back') }}</a>
    </p>
  </div>
</body>
</html>
