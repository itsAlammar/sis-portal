{% extends "layout.html" %}
{% block title %}{{ t('student.add') }}{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ t('student.add') }}</h1></div>
<div class="card" style="max-width:640px;">
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>{{ t('common.national_id') }}</label><input type="text" name="national_id" pattern="\d{10}" maxlength="10">
  <label>{{ t('student.name_ar') }}</label><input type="text" name="name_ar" dir="rtl">
  <div class="grid-2">
    <div><label>{{ t('student.first_name') }}</label><input name="first_name" required></div>
    <div><label>{{ t('student.second_name') }}</label><input name="second_name"></div>
    <div><label>{{ t('student.third_name') }}</label><input name="third_name"></div>
    <div><label>{{ t('student.last_name') }}</label><input name="last_name" required></div>
  </div>
  <label>{{ t('common.email') }}</label><input type="email" name="email" required>
  <label>{{ t('common.mobile') }}</label><input name="phone">
  <div class="grid-2">
    <div><label>{{ t('common.date_of_birth') }}</label><input type="date" name="date_of_birth"></div>
    <div><label>{{ t('common.gender') }}</label><select name="gender"><option value="male">{{ t('common.male') }}</option><option value="female">{{ t('common.female') }}</option></select></div>
    <div><label>{{ t('common.nationality') }}</label><select name="nationality"><option value="Saudi">{{ t('common.saudi') }}</option><option value="Non-Saudi">{{ t('common.non_saudi') }}</option></select></div>
    <div><label>{{ t('student.major') }}</label><select name="major_id"><option value="">—</option>{% for m in majors %}<option value="{{ m.major_id }}">{{ m.name(locale) }}</option>{% endfor %}</select></div>
  </div>
  <label>{{ t('student.advisor') }}</label>
  <select name="advisor_id"><option value="">—</option>{% for tt in teachers %}<option value="{{ tt.teacher_id }}">{{ tt.display_name(locale) }}</option>{% endfor %}</select>
  <div class="actions-row"><button class="btn--primary">{{ t('action.save') }}</button> <a class="btn btn--ghost" href="{{ url_for('students_list') }}">{{ t('action.cancel') }}</a></div>
</form>
</div>
{% endblock %}
