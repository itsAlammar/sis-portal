{% extends "layout.html" %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="page-eyebrow">Student Records</div>
<div class="page-header"><h1>Add student</h1></div>
<div class="card" style="max-width: 560px;">
  <form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field-row">
      <div><label>First name</label><input type="text" name="first_name" required></div>
      <div><label>Last name</label><input type="text" name="last_name" required></div>
    </div>
    <label>Email</label><input type="email" name="email" required>
    <div class="field-row">
      <div><label>Phone</label><input type="text" name="phone"></div>
      <div><label>Date of birth</label><input type="date" name="date_of_birth"></div>
    </div>
    <div class="field-row">
      <div><label>Gender</label>
        <select name="gender"><option value="">—</option><option>Male</option><option>Female</option></select>
      </div>
      <div><label>Program / major</label><input type="text" name="program"></div>
    </div>
    <div class="field-row">
      <div><label>Department</label>
        <select name="department_id">
          <option value="">—</option>
          {% for d in departments %}<option value="{{ d.department_id }}">{{ d.name }}</option>{% endfor %}
        </select>
      </div>
      <div><label>Enrollment date</label><input type="date" name="enrollment_date" value="{{ today }}"></div>
    </div>
    <div class="actions-row">
      <button type="submit" class="btn--primary">Add student</button>
      <a class="btn btn--ghost" href="{{ url_for('students_list') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
