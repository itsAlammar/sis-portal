<!DOCTYPE html>
<html lang="{{ locale }}" dir="{{ dir }}">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup · {{ t('app.short') }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="landing-body">
  <div class="landing-card-solo">
    <div class="page-eyebrow">First-Run Setup</div>
    <h1>{{ t('role.admin') }}</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for c, m in messages %}<div class="flash flash--{{ c }}">{{ m }}</div>{% endfor %}
    {% endwith %}
    <p class="muted">Create the first administrator account.</p>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>{{ t('auth.username') }}</label>
      <input type="text" name="username" required autofocus>
      <label>{{ t('auth.password') }}</label>
      <input type="password" name="password" required minlength="8">
      <label>{{ t('auth.confirm_password') }}</label>
      <input type="password" name="confirm_password" required minlength="8">
      <div class="actions-row"><button class="btn--primary">{{ t('action.submit') }}</button></div>
    </form>
  </div>
</body>
</html>
