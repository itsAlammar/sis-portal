<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Sign In · SIS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="landing-body">
  <div class="landing-card-solo">
    <div class="page-eyebrow">Registrar &amp; Staff</div>
    <h1>Staff sign in</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash--{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ next or '' }}">
      <label>Username</label>
      <input type="text" name="username" required autofocus autocomplete="username">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password">
      <div class="actions-row"><button type="submit" class="btn--primary">Sign in</button></div>
    </form>
    <p class="muted" style="margin-top: 16px;">
      Teachers sign in here too and are taken to their own grading view.
      <a href="{{ url_for('landing') }}">← Back</a>
    </p>
  </div>
</body>
</html>
