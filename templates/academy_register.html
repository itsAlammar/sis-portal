{% extends "academy_layout.html" %}
{% block title %}{{ t('academy.register') }}{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ t('academy.register') }}</h1></div>
<div class="card" style="max-width:460px; margin:0 auto;">
  <form method="post" action="{{ url_for('academy_register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>{{ t('common.name') }}</label><input name="full_name" required>
    <label>{{ t('common.email') }}</label><input name="email" type="email" required>
    <label>{{ t('common.mobile') }}</label><input name="phone">
    <label>{{ t('auth.password') }}</label><input name="password" type="password" required minlength="8">
    <div class="actions-row"><button class="btn--primary">{{ t('academy.register') }}</button></div>
  </form>
  <p class="muted">{{ t('academy.have_account') }} <a href="{{ url_for('academy_login') }}">{{ t('action.login') }}</a></p>
</div>
{% endblock %}
