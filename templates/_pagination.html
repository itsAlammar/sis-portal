{% macro pager(page, pages) %}
{% if pages > 1 %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-top:14px;">
  <span>{% if page > 1 %}<a class="btn btn--ghost btn--small" href="{{ url_for_page(page-1) }}">{{ t('common.previous') }}</a>{% endif %}</span>
  <span class="muted">{{ t('common.page_of', page=page, pages=pages) }}</span>
  <span>{% if page < pages %}<a class="btn btn--ghost btn--small" href="{{ url_for_page(page+1) }}">{{ t('common.next') }}</a>{% endif %}</span>
</div>
{% endif %}
{% endmacro %}
