{% extends "academy_layout.html" %}
{% block title %}{{ t('action.login') }}{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ t('action.login') }}</h1></div>
<div class="card" style="max-width:460px; margin:0 auto;">
  <form method="post" action="{{ url_for('academy_login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>{{ t('common.email') }}</label><input name="email" type="email" required>
    <label>{{ t('auth.password') }}</label><input name="password" type="password" required>
    <div class="actions-row"><button class="btn--primary">{{ t('action.login') }}</button></div>
  </form>
  <p class="muted">{{ t('academy.no_account') }} <a href="{{ url_for('academy_register') }}">{{ t('academy.register') }}</a></p>
</div>
{% endblock %}
