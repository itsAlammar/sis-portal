# Load-balancer config shared by lb1 and lb2 (docker-compose).
# Round-robins across the two app replicas; retries the other on failure.
upstream sis_app {
    server app1:8000 max_fails=3 fail_timeout=15s;
    server app2:8000 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Basic app-level rate limiting hook (tune per environment).
    location / {
        proxy_pass         http://sis_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
